name: Scrape & Update Feed

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily
  workflow_dispatch:        # allow manual trigger

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Start proxy tunnel (gost)
        if: ${{ secrets.PROXY_URL != '' }}
        env:
          SOCKS_PROXY: ${{ secrets.PROXY_URL }}
        run: |
          curl -fsSL https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz | gunzip > gost
          chmod +x gost
          # Convert socks5h:// → socks5:// for gost
          SOCKS_PROXY="${SOCKS_PROXY/socks5h:\/\//socks5://}"
          ./gost -L http://:8118 -F "$SOCKS_PROXY" &
          sleep 2

      - name: Run scraper
        env:
          # If PROXY_URL secret is set, route through local gost HTTP tunnel
          PROXY_URL: ${{ secrets.PROXY_URL != '' && 'http://127.0.0.1:8118' || '' }}
          RSS_LINK: ${{ vars.RSS_LINK }}
        run: python main.py

      - name: Commit & push feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/feed.xml
          git diff --staged --quiet || (
            git commit -m "Auto update $(date -u '+%Y-%m-%d %H:%M')"
            git push
          )
