name: Scrape & Update Feed

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily
  workflow_dispatch:        # allow manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        env:
          # Set PROXY_URL in repo Settings → Secrets → Actions
          # Format: http://user:pass@host:port  or  socks5://host:port
          PROXY_URL: ${{ secrets.PROXY_URL }}
          # Set RSS_LINK in repo Settings → Variables → Actions
          RSS_LINK: ${{ vars.RSS_LINK }}
        run: python main.py

      - name: Commit & push feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/feed.xml
          git diff --staged --quiet || (
            git commit -m "Auto update $(date -u '+%Y-%m-%d %H:%M')"
            git push
          )
