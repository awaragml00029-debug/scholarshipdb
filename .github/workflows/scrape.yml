name: Scrape & Update Feed

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily
  workflow_dispatch:        # allow manual trigger

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Start gost tunnel (only for authenticated SOCKS5)
        env:
          SECRET_PROXY: ${{ secrets.PROXY_URL }}
        run: |
          set -x
          echo "Proxy scheme: $(echo $SECRET_PROXY | cut -d: -f1)"
          if echo "$SECRET_PROXY" | grep -qE '^socks5h?://.+:.+@'; then
            echo "Auth SOCKS5 detected — starting gost tunnel..."
            curl -fsSL https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz | gunzip > gost
            chmod +x gost
            SOCKS="${SECRET_PROXY/socks5h:\/\//socks5://}"
            ./gost -L http://:8118 -F "$SOCKS" &
            sleep 3
            echo "gost started, setting PROXY_URL=http://127.0.0.1:8118"
            echo "PROXY_URL=http://127.0.0.1:8118" >> $GITHUB_ENV
          else
            echo "HTTP or unauthenticated SOCKS5 — using proxy directly"
            echo "PROXY_URL=$SECRET_PROXY" >> $GITHUB_ENV
          fi

      - name: Run scraper
        env:
          RSS_LINK: ${{ vars.RSS_LINK }}
          TRANSLATE_TARGET: ${{ vars.TRANSLATE_TARGET || 'zh-CN' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "Using PROXY_URL: $PROXY_URL"
          python main.py

      - name: Commit & push feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/feed.xml docs/feed_*.xml docs/translations_cache.json docs/notified_urls.json docs/telegraph_token.json
          git diff --staged --quiet || (
            git commit -m "Auto update $(date -u '+%Y-%m-%d %H:%M')"
            git push
          )
